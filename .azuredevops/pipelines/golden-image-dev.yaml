---

name: $(Build.SourceBranchName)-$(Date:yyyyMMdd)_$(Rev:r)
trigger: none
pr: none

pool:
  vmImage: ubuntu-latest
  # name: private-pool-dev-uks

# resources:
#   repositories:
#     - repository: dtos-devops-templates
#       type: github
#       name: NHSDigital/dtos-devops-templates
#       ref: feat/DTOSS-8488-Automate-AVD-Golden-Image-Creation-and-Maintenance
#       endpoint: NHSDigital

variables:
  - group: DEV_agent_backend
  - group: DEV_hub_backend_remote_state
  - name: ENVIRONMENT
    value: development
  - name: RESOURCE_GROUP
    value: 'RG-HUB-DEV-UKS-HUB-VIRTUAL-DESKTOP'
  - name: LOCATION
    value: 'uksouth'
  - name: TEMPLATE_NAME
    value: 'avd-golden-image'
  - name: TEMPLATE_FILE
    value: 'scripts/golden-image/aib-template.json'

stages:
- stage: BuildImage
  displayName: Build AVD Golden Image
  jobs:
  - job: Build
    displayName: Run Azure Image Builder
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self

    - task: AzureCLI@2
      inputs:
        azureSubscription: $(SERVICE_CONNECTION)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          echo "=== az version ==="
          az --version

          echo "Reading and displaying AIB template file: $(TEMPLATE_FILE)"
          ls -l "$(TEMPLATE_FILE)"

          echo "Check if 'az image builder' is available..."
          if az image builder -h >/dev/null 2>&1; then
            echo "az image builder is available"
          else
            echo "az image builder not found. Trying az upgrade (may require permission)..."
            az upgrade --yes || echo "az upgrade failed or not permitted - continuing anyway"
          fi

          echo "Registering provider Microsoft.VirtualMachineImages (safe to run if already registered)..."
          az provider register -n Microsoft.VirtualMachineImages

          echo "Submitting AIB template with az image builder create..."
          az image builder create \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$(TEMPLATE_NAME)" \
            --image-template @"$(TEMPLATE_FILE)" \
            --location "$(LOCATION)"

          echo "Running AIB image build..."
          az image builder run \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$(TEMPLATE_NAME)"

          echo "Build complete."
